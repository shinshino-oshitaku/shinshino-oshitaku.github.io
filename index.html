<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>しんしのおしたく</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', sans-serif; background: #1a2a1a; -webkit-font-smoothing: antialiased; }
    .screen { display: none; width: 100%; min-height: 100vh; min-height: 100dvh; overflow-x: hidden; }
    .screen.active { display: flex; flex-direction: column; }

    /* MAP */
    #screen-map { background: #87CEEB; }
    .map-topbar { background: rgba(0,0,0,.32); backdrop-filter: blur(8px); padding: 12px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .tb-info { flex: 1 1 0; min-width: 0; }
    .tb-car { font-size: 20px; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display:flex; align-items:center; gap:8px; min-width:0; }
    .tb-car-icon { width:42px; height:32px; flex:0 0 auto; display:block; }
    .tb-car-icon svg { width:100%; height:100%; display:block; }
    .tb-pts { font-size: 14px; color: rgba(255,255,255,.65); margin-top: 3px; }
    .tb-garage { position: relative; width: 58px; height: 50px; background: rgba(255,255,255,.24); border: none; border-radius: 13px; padding: 5px; cursor: pointer; font-family: inherit; flex: 0 0 auto; overflow: hidden; display:flex; align-items:center; justify-content:center; }
    .tb-garage svg { width:44px; height:40px; display:block; filter:drop-shadow(0 1px 2px rgba(0,0,0,.25)); }
    .map-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
    .map-content { position: relative; width: 100%; }
    .hidden { display:none !important; }
    .map-svg { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; z-index:2; }
    .scenery-svg { position:absolute; inset:0 0 auto 0; width:100%; pointer-events:none; z-index:1; }
    .world-bg { position: absolute; left: 0; right: 0; }
    .world-banner { position: absolute; left: 8px; right: 8px; background: rgba(0,0,0,.38); backdrop-filter: blur(4px); border-radius: 14px; padding: 8px 16px; display: flex; align-items: center; gap: 10px; }
    .wb-icon { width:28px; height:28px; display:block; flex:0 0 auto; }
    .wb-icon svg { width:100%; height:100%; display:block; }
    .wb-e { font-size: 24px; }
    .wb-n { font-size: 16px; font-weight: bold; color: #fff; }
    .wb-p { font-size: 14px; color: rgba(255,255,255,.55); margin-left: auto; }
    .map-node { position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 7px; font-size: 42px; cursor: pointer; z-index: 5; transition: transform .12s; overflow: hidden; }
    .map-node:active { transform: scale(.88); }
    .map-node.completed { background: #fff; border: 5px solid #4CAF50; box-shadow: 0 3px 12px rgba(0,0,0,.22); }
    .map-node.current   { background: #fff; border: 5px solid #FF6B35; box-shadow: 0 0 0 10px rgba(255,107,53,.2), 0 4px 16px rgba(0,0,0,.28); animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 10px rgba(255,107,53,.2),0 4px 16px rgba(0,0,0,.28)} 50%{box-shadow:0 0 0 18px rgba(255,107,53,.08),0 4px 16px rgba(0,0,0,.28)} }
    .map-node.fog-near   { background: #fff; border: 5px solid rgba(150,180,220,.55); filter: blur(.5px); }
    .map-node.fog-far    { background: rgba(200,220,255,.65); border: 5px solid rgba(150,180,220,.35); filter: blur(2.5px); opacity: .65; }
    .map-node.fog-hidden { background: rgba(200,220,255,.35); border: 5px solid rgba(150,180,220,.2); filter: blur(6px); opacity: .3; }
    .node-fog { position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px; border-radius: 50%; pointer-events: none; z-index: 6; }
    .fog-near .node-fog   { background: radial-gradient(circle,rgba(200,220,255,.25) 0%,rgba(200,220,255,.55) 100%); }
    .fog-far .node-fog    { background: radial-gradient(circle,rgba(200,220,255,.45) 0%,rgba(200,220,255,.82) 100%); }
    .fog-hidden .node-fog { background: radial-gradient(circle,rgba(200,220,255,.65) 0%,rgba(200,220,255,.95) 100%); }
    .node-trophy { position: absolute; top: -10px; right: -10px; font-size: 20px; z-index: 7; pointer-events: none; }
    .node-label  { position: absolute; z-index: 5; font-size: 13px; font-weight: bold; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.55); white-space: nowrap; pointer-events: none; text-align: center; }
    .node-track  { position: absolute; z-index: 5; height: 8px; background: rgba(255,255,255,.3); border-radius: 4px; overflow: hidden; }
    .node-fill   { height: 100%; background: #FF6B35; border-radius: 4px; transition: width .5s; }
    .map-place { position:absolute; z-index:3; min-width:116px; max-width:150px; padding:8px 10px 10px; border-radius:14px; background:rgba(255,255,255,.68); border:3px solid rgba(255,255,255,.75); box-shadow:0 3px 10px rgba(0,0,0,.12); pointer-events:none; }
    .map-place-title { display:flex; align-items:center; gap:5px; font-size:12px; font-weight:bold; color:#2F3A3D; white-space:nowrap; }
    .map-place-icon { width:24px; height:24px; flex:0 0 auto; }
    .map-place-icon svg { width:100%; height:100%; display:block; }
    .map-place-note { margin-top:4px; font-size:10px; line-height:1.15; color:#52705A; font-weight:bold; }
    .scenery-item { position:absolute; z-index:2; pointer-events:none; filter:drop-shadow(0 2px 3px rgba(0,0,0,.16)); }
    .tree { width:24px; height:31px; }
    .tree::before { content:''; position:absolute; left:3px; top:0; width:18px; height:20px; border-radius:50% 50% 45% 45%; background:#4F9F52; border:2px solid #2F6F36; }
    .tree::after { content:''; position:absolute; left:9px; top:18px; width:7px; height:12px; border-radius:3px; background:#8B5A2B; }
    .flower { width:18px; height:18px; border-radius:50%; background:#FFE66D; border:2px solid #5F9E55; box-shadow:8px 1px 0 -4px #FF7A9A,-7px 2px 0 -4px #FF7A9A,1px 8px 0 -4px #FF7A9A; }
    .cone { width:20px; height:22px; background:linear-gradient(to bottom,#FFB74D 0 25%,#fff 25% 38%,#FF7A5C 38% 100%); clip-path:polygon(50% 0,95% 100%,5% 100%); }
    .player { position: absolute; width: 44px; height: 52px; z-index: 8; pointer-events: none; filter: drop-shadow(0 2px 4px rgba(0,0,0,.28)); }
    .player svg { width: 100%; height: 100%; display: block; }

    /* Event markers */
    .event-marker  { position: absolute; z-index: 10; cursor: pointer; text-align: center; transform: translateX(-50%); }
    .event-emoji   { font-size: 58px; display: block; animation: firePulse .5s ease-in-out infinite; line-height: 1; }
    .event-hint    { font-size: 14px; font-weight: bold; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.7); margin-top: 4px; white-space: nowrap; background: rgba(255,80,0,.7); border-radius: 8px; padding: 2px 8px; display: inline-block; }
    .preview-marker { position: absolute; z-index: 9; cursor: pointer; text-align: center; transform: translateX(-50%); }
    .preview-marker:active { transform: translateX(-50%) scale(.92); }
    .preview-emoji  { font-size: 46px; display: block; filter: grayscale(.2); }
    .preview-lock   { width: 18px; height: 18px; display: block; margin: -4px auto 0; opacity: .82; filter: drop-shadow(0 1px 2px rgba(0,0,0,.35)); }
    .preview-lock svg { width: 100%; height: 100%; display: block; }
    .preview-hint   { font-size: 11px; font-weight: bold; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.7); background: rgba(0,0,0,.45); border-radius: 6px; padding: 2px 7px; display: inline-block; margin-top: 3px; white-space: nowrap; }
    @keyframes firePulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }

    /* Event animation keyframes */
    @keyframes waterDrop  { 0%{opacity:1;transform:scale(.4)} 60%{opacity:1;transform:scale(1.1)} 100%{opacity:0;transform:scale(.7) translateY(6px)} }
    @keyframes thiefRun   { 0%,100%{transform:translateX(-5px) scaleX(1)} 50%{transform:translateX(5px) scaleX(-1)} }
    @keyframes policeFlash{ 0%,100%{background:rgba(0,30,255,.35);box-shadow:0 0 30px rgba(0,30,255,.5)} 50%{background:rgba(255,0,0,.35);box-shadow:0 0 30px rgba(255,0,0,.5)} }
    @keyframes healBeat   { 0%{opacity:1;transform:scale(.5) translateY(0)} 50%{opacity:1;transform:scale(1.3) translateY(-12px)} 100%{opacity:0;transform:scale(.8) translateY(-20px)} }
    @keyframes fadeScale  { 0%{opacity:0;transform:scale(.5)} 40%{opacity:1;transform:scale(1.3)} 100%{opacity:0;transform:scale(1)} }
    @keyframes slideInRight { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
    @keyframes popIn      { 0%{opacity:0;transform:scale(0)} 70%{transform:scale(1.3)} 100%{opacity:1;transform:scale(1)} }
    @keyframes splashOut  { 0%{opacity:1;transform:scale(.4)} 100%{opacity:0;transform:scale(1.8)} }

    /* HERO BUTTON */
    .map-hero { background: rgba(0,0,0,.28); backdrop-filter: blur(8px); padding: 14px 16px calc(14px + env(safe-area-inset-bottom)); flex-shrink: 0; }
    .hero-btn { width: 100%; border: none; border-radius: 24px; font-family: inherit; font-weight: bold; cursor: pointer; font-size: 28px; padding: 24px 20px; letter-spacing: .02em; transition: background .3s, transform .08s; }
    .hero-btn .btn-icon { width:36px; height:36px; display:inline-block; vertical-align:-8px; margin-right:8px; }
    .hero-btn .btn-icon svg { width:100%; height:100%; display:block; }
    .hero-btn:active  { transform: scale(.97); }
    .hero-btn.orange  { background: #FF6B35; color: #fff; box-shadow: 0 6px 22px rgba(255,107,53,.55); }
    .hero-btn.red     { background: #E53935; color: #fff; box-shadow: 0 6px 22px rgba(229,57,53,.55); animation: heroRedPulse 1s ease-in-out infinite; }
    @keyframes heroRedPulse { 0%,100%{box-shadow:0 6px 22px rgba(229,57,53,.55)} 50%{box-shadow:0 6px 32px rgba(229,57,53,.85)} }
    .hero-btn.done    { background: rgba(255,255,255,.22); color: rgba(255,255,255,.65); font-size: 22px; pointer-events: none; }

    /* Popup */
    .popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 24px; }
    .popup-overlay.hidden { display: none; }
    .popup-box { background: #1F2937; border-radius: 24px; padding: 28px 24px; text-align: center; width: 100%; max-width: 340px; }
    .popup-obstacle { font-size: 72px; margin-bottom: 8px; }
    .popup-title    { font-size: 20px; font-weight: bold; color: #FFE66D; margin-bottom: 10px; line-height: 1.4; }
    .popup-body     { font-size: 15px; color: rgba(255,255,255,.7); line-height: 1.6; margin-bottom: 22px; }
    .popup-progress { display: flex; gap: 8px; justify-content: center; margin-bottom: 22px; }
    .popup-dot      { width: 16px; height: 16px; border-radius: 50%; background: rgba(255,255,255,.15); border: 2px solid rgba(255,255,255,.2); }
    .popup-dot.on   { background: #FF6B35; border-color: #FF6B35; }
    .popup-dot.bonus{ background: #FFD700; border-color: #FFD700; }

    /* GARAGE */
    #screen-garage { background: #EAF6FF; color: #263238; }
    .gar-head  { background: #6FA8C6; padding: 18px 16px 14px; text-align: center; color: #fff; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    .gar-title { font-size: 26px; font-weight: bold; color: #fff; }
    .gar-sub   { font-size: 15px; color: rgba(255,255,255,.78); margin-top: 5px; }
    .gar-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:12px 16px 4px; background:#D9EFFB; }
    .gar-actions .btn { margin:0; border-radius:16px; font-size:15px; padding:13px 10px; box-shadow:none; }
    .gar-actions .btn-ghost { background:#fff; color:#4D7080; }
    .gar-actions .btn-ghostw { background:#5F87A1; color:#fff; }
    .gar-grid  { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; padding: 14px 16px 16px; flex: 1; overflow-y: auto; align-content: start; background:#EAF6FF; }
    .gar-cell  { aspect-ratio: 1; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; border: 2px solid rgba(95,135,161,.22); box-shadow: 0 3px 10px rgba(95,135,161,.12); overflow:hidden; }
    .gar-cell.owned  { aspect-ratio: auto; min-height: 136px; padding: 10px 8px 8px; background: #fff; border-color: rgba(95,135,161,.38); cursor: pointer; }
    .gar-cell.owned:active { opacity: .8; }
    .gar-cell.locked { filter: grayscale(1); opacity: .38; }
    .gar-cell .ce { font-size: 28px; }
    .gar-cell .cn { font-size: 11px; color: #52656E; margin-top: 4px; text-align: center; line-height: 1.2; font-weight: bold; }
    .gar-cell-svg { width: 100%; height: 74px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .gar-cell-svg svg { width:92%; height:100%; display:block; }
    .gar-cell .bldg { font-size: 22px; margin-top: 2px; }
    .gar-cell .bldg { width:28px; height:28px; display:block; margin:2px auto 0; }
    .gar-cell .bldg svg { width:100%; height:100%; display:block; }
    .gar-foot { padding: 16px; background:#EAF6FF; }
    .reset-wrap { position: relative; overflow: hidden; border-radius: 14px; margin-top: 10px; }
    .reset-bar  { position: absolute; bottom: 0; left: 0; height: 3px; width: 0; background: rgba(255,80,80,.7); border-radius: 2px; }
    .reset-bar.go { width: 100%; transition: width 3s linear; }
    .reset-btn  { width: 100%; background: rgba(95,135,161,.12); color: rgba(38,50,56,.45); border: none; border-radius: 14px; font-family: inherit; font-size: 13px; padding: 14px; cursor: pointer; }
    .share-note { grid-column:1/-1; font-size: 11px; line-height: 1.5; color: rgba(38,50,56,.55); text-align: center; margin-top: -2px; }
    .parent-tools { border-top:1px solid rgba(95,135,161,.22); margin-top:10px; padding-top:14px; }
    .parent-tools-title { font-size:12px; color:rgba(38,50,56,.45); text-align:center; margin-bottom:8px; }

    /* CHECKLIST */
    #screen-checklist { background: #EFF6FF; }
    .cl-head { text-align: center; padding: 20px 16px; }
    .cl-head h1 { font-size: 28px; color: #333; }
    .cl-preview { font-size: 16px; color: #999; margin-top: 6px; }
    .task-list { display: flex; flex-direction: column; gap: 12px; padding: 0 16px; flex: 1; }
    .task-item { background: #fff; border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.07); cursor: pointer; border: 3px solid transparent; transition: background .18s, border-color .18s, transform .08s; user-select: none; }
    .task-item:active { transform: scale(.98); }
    .task-item.done { background: #F0FFF4; border-color: #4CAF50; }
    .t-emoji { font-size: 44px; flex-shrink: 0; }
    .screen h1 .title-icon { width:34px; height:34px; display:inline-block; vertical-align:-7px; margin-right:8px; }
    .screen h1 .title-icon svg { width:100%; height:100%; display:block; }
    .t-name  { font-size: 24px; font-weight: bold; color: #333; flex: 1; }
    .t-check { width: 42px; height: 42px; border-radius: 50%; border: 3px solid #DDD; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: all .18s; flex-shrink: 0; }
    .task-item.done .t-check { background: #4CAF50; border-color: #4CAF50; color: #fff; }
    /* Part preview under each task */
    .t-part { font-size: 11px; color: #aaa; margin-top: 4px; }
    .task-item.done .t-part { color: #4CAF50; }
    .cl-foot { padding: 16px; }
    /* Bonus banner */
    .bonus-banner { margin: 8px 16px 0; background: linear-gradient(90deg,#FF6B35,#FFD700); border-radius: 14px; padding: 10px 16px; text-align: center; font-size: 15px; font-weight: bold; color: #fff; transition: opacity .3s; }
    .bonus-banner.hidden { opacity: .35; }

    /* PARENT */
    #screen-parent { background: #0F0F2A; color: #fff; padding: 24px 18px; }
    .par-hero  { text-align: center; margin-bottom: 24px; }
    .par-icon  { font-size: 64px; }
    .par-title { font-size: 24px; color: #FFE66D; margin-top: 8px; font-weight: bold; }
    .par-sub   { font-size: 15px; color: rgba(255,255,255,.45); margin-top: 6px; }
    .par-list  { background: rgba(255,255,255,.08); border-radius: 20px; padding: 6px 20px; margin-bottom: 24px; flex: 1; }
    .par-row   { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,.07); }
    .par-row:last-child { border: none; }
    .par-lbl   { flex: 1; font-size: 18px; }
    .par-part  { font-size: 12px; color: rgba(255,255,255,.4); margin-top: 2px; }
    .par-bonus { background: rgba(255,215,0,.15); border-radius: 12px; padding: 10px 16px; margin-bottom: 16px; text-align: center; font-size: 15px; color: #FFD700; font-weight: bold; }

    /* PART GAIN */
    #screen-part-gain { background: linear-gradient(155deg,#0D0020,#1a0044); color: #fff; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    .pg-svg-wrap { width: 220px; height: 165px; }
    .pg-label { font-size: 15px; color: rgba(255,255,255,.42); letter-spacing: .14em; margin-top: 16px; }
    .pg-name  { font-size: 34px; font-weight: bold; color: #FFE66D; margin: 10px 0 4px; }
    .pg-special { font-size: 34px; font-weight: bold; color: #FFD700; margin: 10px 0 4px; animation: specialGlow 0.8s ease-in-out infinite alternate; }
    @keyframes specialGlow { from{text-shadow:0 0 10px #FFD700} to{text-shadow:0 0 30px #FFD700, 0 0 60px #FF6B35} }
    .pg-dots  { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
    .pg-dot   { width: 18px; height: 18px; border-radius: 50%; background: rgba(255,255,255,.13); border: 2px solid rgba(255,255,255,.2); }
    .pg-dot.on    { background: #FF6B35; border-color: #FF6B35; }
    .pg-dot.bonus { background: #FFD700; border-color: #FFD700; box-shadow: 0 0 8px #FFD700; }
    @keyframes partSnap { 0%{opacity:0;transform:translateY(-28px) scale(.75)} 100%{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes fadeUp   { from{transform:translateY(14px);opacity:0} to{transform:translateY(0);opacity:1} }
    .fadeup { animation: fadeUp .38s ease both; animation-delay: .2s; opacity: 0; }

    /* CAR COMPLETE */
    #screen-car-complete { background: linear-gradient(148deg,#FF6B35,#FFE66D); color: #fff; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .cc-svg   { width: 240px; height: 180px; }
    .cc-title { font-size: 36px; font-weight: bold; text-shadow: 0 2px 8px rgba(0,0,0,.14); margin-top: 12px; }
    .cc-sub   { font-size: 18px; color: rgba(255,255,255,.8); margin-top: 8px; margin-bottom: 36px; }
    @keyframes wobble { 0%,100%{transform:rotate(-7deg) scale(1.05)} 50%{transform:rotate(7deg) scale(1.05)} }
    .wobble { animation: wobble .45s ease-in-out infinite; }

    /* SHARED */
    .btn { border: none; border-radius: 22px; font-family: inherit; font-weight: bold; cursor: pointer; width: 100%; transition: transform .08s, opacity .08s; }
    .btn:active { transform: scale(.96); }
    .btn:disabled { opacity: .42; pointer-events: none; }
    .btn-orange { background: #FF6B35; color: #fff; font-size: 24px; padding: 20px 24px; box-shadow: 0 4px 14px rgba(255,107,53,.45); }
    .btn-green  { background: #4CAF50; color: #fff; font-size: 24px; padding: 20px 24px; box-shadow: 0 4px 14px rgba(76,175,80,.45); }
    .btn-ghost  { background: rgba(0,0,0,.07); color: #666; font-size: 18px; padding: 16px 24px; margin-top: 12px; }
    .btn-ghostw { background: rgba(255,255,255,.16); color: #fff; font-size: 18px; padding: 16px 24px; margin-top: 12px; }
    .sp { flex: 1; }
    .p16 { padding: 0 16px 16px; }
    .spark { position: fixed; pointer-events: none; z-index: 9999; animation: spFade .65s ease forwards; }
    @keyframes spFade { 0%{opacity:1;transform:scale(.3) translateY(0)} 100%{opacity:0;transform:scale(1.2) translateY(-28px)} }

    /* PARTS PREVIEW */
    .parts-preview { display:flex; align-items:center; gap:10px; margin-bottom:10px; padding:8px 12px; background:rgba(255,255,255,.09); border-radius:16px; }
    .parts-car-svg { width:88px; height:66px; flex-shrink:0; }
    .parts-info { flex:1; min-width:0; }
    .parts-car-name { font-size:13px; font-weight:bold; color:#fff; margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .parts-dots-row { display:flex; gap:7px; }
    .pd-dot { width:13px; height:13px; border-radius:50%; background:rgba(255,255,255,.15); border:2px solid rgba(255,255,255,.2); transition:background .3s,border-color .3s; }
    .pd-dot.on    { background:#FF6B35; border-color:#FF6B35; }
    .pd-dot.bonus { background:#FFD700; border-color:#FFD700; box-shadow:0 0 6px #FFD700; }
    .nearby-panel { margin-top:10px; padding:9px; border-radius:16px; background:rgba(255,255,255,.88); box-shadow:0 2px 8px rgba(0,0,0,.12); color:#2F3A3D; }
    .nearby-title { font-size:12px; font-weight:bold; color:#5F87A1; margin:0 2px 7px; }

let audioCtx=null, audioReady=false, fireSoundTimer=null, reminderTimer=null, lastReminderIdx=0;
function ensureAudio(){
  if(audioReady)return;
  audioReady=true;
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    if(AC&&!audioCtx)audioCtx=new AC();
    if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  }catch{}
}
function speak(text){
  ensureAudio();
  try{
    if(!('speechSynthesis' in window))return;
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ja-JP';u.rate=.88;u.pitch=1.22;u.volume=.95;
    const v=speechSynthesis.getVoices().find(x=>/ja|Japan|日本/i.test(x.lang+x.name));
    if(v)u.voice=v;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }catch{}
}
function tone(freq,dur=.18,type='sine',vol=.16,delay=0){
  if(!audioCtx)return;
  const t=audioCtx.currentTime+delay;
  const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
  osc.type=type;osc.frequency.setValueAtTime(freq,t);
  gain.gain.setValueAtTime(0,t);
  gain.gain.linearRampToValueAtTime(vol,t+.012);
  gain.gain.exponentialRampToValueAtTime(.001,t+dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t);osc.stop(t+dur+.03);
}
function noiseBurst(dur=.3,vol=.12,delay=0,filterFreq=900){
  if(!audioCtx)return;
  const t=audioCtx.currentTime+delay;
  const len=Math.max(1,Math.floor(audioCtx.sampleRate*dur));
  const buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<len;i++)data[i]=(Math.random()*2-1)*(1-i/len);
  const src=audioCtx.createBufferSource(),gain=audioCtx.createGain(),filter=audioCtx.createBiquadFilter();
  filter.type='bandpass';filter.frequency.setValueAtTime(filterFreq,t);filter.Q.value=.9;
  gain.gain.setValueAtTime(vol,t);gain.gain.exponentialRampToValueAtTime(.001,t+dur);
  src.buffer=buf;src.connect(filter).connect(gain).connect(audioCtx.destination);
  src.start(t);src.stop(t+dur+.02);
}

function soundAttach(){ensureAudio();tone(185,.18,'sawtooth',.12);tone(370,.14,'square',.11,.08);tone(740,.24,'triangle',.14,.19);noiseBurst(.16,.08,.08,2600);}
function soundComplete(){ensureAudio();[523,659,784,1046].forEach((f,i)=>tone(f,.18,'triangle',.14,i*.11));}
function soundSiren(){
  ensureAudio();
  for(let i=0;i<8;i++){tone(i%2?880:520,.18,'sawtooth',.09,i*.18);}
}
function soundWater(){ensureAudio();for(let i=0;i<8;i++)noiseBurst(.24,.09,i*.08,1200+i*110);}
function startFireSound(){
  ensureAudio();stopFireSound();
  const crackle=()=>{noiseBurst(.18,.055,0,2600+Math.random()*900);if(Math.random()>.45)tone(90+Math.random()*45,.08,'sawtooth',.035);};
  crackle();fireSoundTimer=setInterval(crackle,240);
}
function stopFireSound(){if(fireSoundTimer){clearInterval(fireSoundTimer);fireSoundTimer=null;}}
function nextReminderText(){
  const pending=TASKS.filter(t=>!state.tasks[t.id]);
  if(!pending.length)return '';
  const t=pending[lastReminderIdx%pending.length];
  lastReminderIdx++;
  return REMINDER_TEXT[t.id]||`${t.name}は、おわったかな？`;
}
function startReminderLoop(){
  if(reminderTimer)return;
  reminderTimer=setInterval(()=>{
    if(state.approvedToday||TASKS.every(t=>state.tasks[t.id]))return;
    const text=nextReminderText();
    if(text)speak(text);
  },5*60*1000);
}
function stopReminderLoop(){if(reminderTimer){clearInterval(reminderTimer);reminderTimer=null;}}

// ── SVGルーティング ───────────────────────────────────────────
const CAR_SVG_FNS={fire:fireTruckSVG,police:policeSVG,ambu:ambuSVG,taxi:taxiSVG,excav:excavSVG,bull:bullSVG,crane:craneSVG,dump:dumpSVG,bus:busSVG,truck:truckSVG,mail:mailSVG,garb:garbSVG,tow:towSVG,snow:snowSVG,roller:rollerSVG,aerial:aerialSVG,ladder:ladderSVG,tanker:tankerSVG,school:schoolSVG,water:waterSVG};

function getCarSVG(id,dots,animIdx=-1){
  const fn=CAR_SVG_FNS[id];
  if(fn)return fn(dots,animIdx);
  const s=STAGES.find(x=>x.id===id);
  return placeholderSVG(s?s.color:'#888',s?s.name:id,dots,animIdx);
}
function carLabelHTML(s){
  return `<span class="tb-car-icon">${getCarSVG(s.id,ALL_TRUE)}</span><span>${s.name}</span>`;
}
function carInlineHTML(s){
  return `<span class="inline-svg-icon">${getCarSVG(s.id,ALL_TRUE)}</span>${s.name}`;
}

const ALL_TRUE=[true,true,true,true,true];
const ALL_FALSE=[false,false,false,false,false];

// ── STATE ─────────────────────────────────────────────────────
function defState(){
  return{date:'',approvedToday:false,
    tasks:Object.fromEntries(TASKS.map(t=>[t.id,false])),
    stage:0, earnedParts:[...ALL_FALSE], pendingEvent:-1, buildings:[], townIssues:[]};
}
function encodeStateForUrl(s){
  try{return btoa(unescape(encodeURIComponent(JSON.stringify(s)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
  catch{return '';}
}
function decodeStateFromUrl(){
  try{
    const m=location.hash.match(/(?:^|&)k=([^&]+)/);
    if(!m)return null;
    let raw=m[1].replace(/-/g,'+').replace(/_/g,'/');
    raw+=Array((4-raw.length%4)%4+1).join('=');
    return JSON.parse(decodeURIComponent(escape(atob(raw))));
  }catch{return null;}
}
function normalizeState(s){
  const base=defState();
  if(!s||typeof s!=='object')return base;
  s={...base,...s};
  s.tasks={...base.tasks,...(s.tasks||{})};
  if(!Array.isArray(s.earnedParts))s.earnedParts=[...ALL_FALSE];
  if(s.pendingEvent===undefined)s.pendingEvent=-1;
  if(!Array.isArray(s.buildings))s.buildings=[];
  if(!Array.isArray(s.townIssues))s.townIssues=[];
  syncStoryIssues(s);
  const excavIdx=STAGES.findIndex(x=>x.id==='excav');
  if(excavIdx>=0&&s.stage>excavIdx&&s.pendingEvent!==excavIdx){
    s.townIssues.forEach(issue=>{
      if(issue.type==='burned-house'&&issue.state==='burned'&&issue.requiredVehicle==='excav'){
        issue.state='repaired';
        s.buildings[issue.stageIdx??0]=true;
      }
    });
  }
  const today=new Date().toDateString();
  const isNewDay=s.date!==today;
  if(isNewDay){s.date=today;s.approvedToday=false;s.tasks=Object.fromEntries(TASKS.map(t=>[t.id,false]));}
  if(isNewDay&&s.pendingEvent<0&&shouldRepeatPoliceEvent(s))s.pendingEvent=stageIndexById('police');
  return s;
}
function loadState(){
  try{
    const fromUrl=decodeStateFromUrl();
    if(fromUrl)return normalizeState(fromUrl);
    return normalizeState(JSON.parse(localStorage.getItem('kuruma-v5')||'null'));
  }catch{return defState();}
}
function save(){
  state.date=new Date().toDateString();
  localStorage.setItem('kuruma-v5',JSON.stringify(state));
}
let state=loadState();save();

function addTownIssue(issue){
  if(!Array.isArray(state.townIssues))state.townIssues=[];
  if(state.townIssues.some(x=>x.id===issue.id))return;
  state.townIssues.push(issue);
}

function stageIndexById(id){return STAGES.findIndex(x=>x.id===id);}

function issueExists(list,id){return (list||[]).some(x=>x.id===id);}

function syncStoryIssues(s){
  const issues=Array.isArray(s.townIssues)?s.townIssues:[];
  const add=(issue)=>{if(!issueExists(issues,issue.id))issues.push(issue);};
  const policeIdx=stageIndexById('police'), ambuIdx=stageIndexById('ambu'), taxiIdx=stageIndexById('taxi');
  const bullIdx=stageIndexById('bull'), craneIdx=stageIndexById('crane');
  if(policeIdx>=0&&s.stage>policeIdx&&!issueExists(issues,'police-station')){
    add({id:'police-risk',type:'police-risk',state:'risk',createdBy:'police',requiredVehicle:'bull',stageIdx:policeIdx});
  }
  if(ambuIdx>=0&&s.stage>ambuIdx)add({id:'hospital-needed',type:'hospital-needed',state:'needed',createdBy:'ambu',requiredVehicle:'crane',stageIdx:ambuIdx});
  if(taxiIdx>=0&&s.stage>taxiIdx)add({id:'transit-needed',type:'transit-needed',state:'needed',createdBy:'taxi',requiredVehicle:'bus',stageIdx:taxiIdx});
  const police=issues.find(x=>x.id==='police-risk');
  if(police&&bullIdx>=0&&s.stage>bullIdx&&s.pendingEvent!==bullIdx)police.state='lot';
  if(police&&craneIdx>=0&&s.stage>craneIdx&&s.pendingEvent!==craneIdx){
    police.id='police-station';police.type='police-station';police.state='built';police.requiredVehicle=null;
    if(!Array.isArray(s.buildings))s.buildings=[];
    if(policeIdx>=0)s.buildings[policeIdx]=true;
  }
  s.townIssues=issues;
}

function addPoliceRiskIssue(stageIdx){
  addTownIssue({id:'police-risk',type:'police-risk',state:'risk',createdBy:'police',requiredVehicle:'bull',stageIdx});
}

function addHospitalNeededIssue(stageIdx){
  addTownIssue({id:'hospital-needed',type:'hospital-needed',state:'needed',createdBy:'ambu',requiredVehicle:'crane',stageIdx});
}

function addTransitNeededIssue(stageIdx){
  addTownIssue({id:'transit-needed',type:'transit-needed',state:'needed',createdBy:'taxi',requiredVehicle:'bus',stageIdx});
}

function addBurnedHouseIssue(stageIdx){
  addTownIssue({
    id:`burned-house-${stageIdx}`,
    type:'burned-house',
    state:'burned',
    createdBy:STAGES[stageIdx]?.id||'fire',
    requiredVehicle:'excav',
    stageIdx
  });
}

function hasVehicle(id){
  const idx=STAGES.findIndex(x=>x.id===id);
  return idx>=0&&state.stage>idx;
}

function shouldRepeatPoliceEvent(s){
  const policeIdx=stageIndexById('police');
  if(policeIdx<0||s.stage<=policeIdx)return false;
  const stationBuilt=(s.townIssues||[]).some(issue=>issue.type==='police-station'&&issue.state==='built');
  return !stationBuilt;
}

function resolveBurnedHouseIssues(){
  let changed=false;
  if(!Array.isArray(state.townIssues))state.townIssues=[];
  if(!Array.isArray(state.buildings))state.buildings=[];
  state.townIssues.forEach(issue=>{
    if(issue.type==='burned-house'&&issue.state==='burned'&&issue.requiredVehicle==='excav'){
      issue.state='repaired';
      state.buildings[issue.stageIdx??0]=true;
      changed=true;
    }
  });
  return changed;
}

function advancePoliceStory(vehicleId){
  if(!Array.isArray(state.townIssues))state.townIssues=[];
  let issue=state.townIssues.find(x=>x.id==='police-risk'||x.id==='police-station');
  const policeIdx=stageIndexById('police');
  if(!issue){
    issue={id:'police-risk',type:'police-risk',state:'risk',createdBy:'police',requiredVehicle:'bull',stageIdx:policeIdx};
    state.townIssues.push(issue);
  }
  if(vehicleId==='bull'&&issue.state==='risk'){
    issue.state='lot';issue.requiredVehicle='crane';
    return true;
  }
  if(vehicleId==='crane'&&(issue.state==='risk'||issue.state==='lot')){
    issue.id='police-station';issue.type='police-station';issue.state='built';issue.requiredVehicle=null;
    if(!Array.isArray(state.buildings))state.buildings=[];
    if(policeIdx>=0)state.buildings[policeIdx]=true;
    return true;
  }
  return false;
}

function repairTownIssue(issueId){
  const issue=(state.townIssues||[]).find(x=>x.id===issueId);
  if(!issue||issue.state!=='burned'||issue.requiredVehicle!=='excav'||!hasVehicle('excav'))return;
  issue.state='repaired';
  if(!Array.isArray(state.buildings))state.buildings=[];
  state.buildings[issue.stageIdx??0]=true;
  save();
  document.getElementById('preview-popup').classList.add('hidden');
  speak('ショベルカーで、こわれたおうちをかたづけたよ。');
  for(let i=0;i<8;i++)setTimeout(randSpark,i*70);
  buildMap();
}

async function copyShareUrl(){
  const code=encodeStateForUrl(state);
  if(!code)return alert('記録URLを作れませんでした');
  const url=`${location.origin}${location.pathname}${location.search}#k=${code}`;
  try{
    await navigator.clipboard.writeText(url);
    alert('記録URLをコピーしました。別のブラウザで開くと同じ記録になります。');
  }catch{
    prompt('このURLをコピーしてください',url);
  }
}

    if(state.pendingEvent>=0&&state.stage<STAGES.length)addActiveMarker(content,W);

function townIssueMeta(issue){
  if(issue.type==='burned-house'&&issue.state==='burned')return{icon:'🏚️',label:'あとでなおす',title:'もえたおうちが<br>まだのこっているよ'};
  if(issue.type==='police-risk'&&issue.state==='risk')return{icon:'🦹',label:'またでるかも',title:'どろぼうが<br>またくるかも'};
  if(issue.type==='police-risk'&&issue.state==='lot')return{icon:'🚧',label:'けいさつしょ予定地',title:'けいさつしょの<br>じゅんびちゅう'};
  if(issue.type==='police-station'&&issue.state==='built')return{icon:'🏢',label:'けいさつしょ',title:'けいさつしょ<br>かんせい！'};
  if(issue.type==='hospital-needed')return{icon:'🤕',label:'びょういんがいる',title:'びょういんが<br>まだないよ'};
  if(issue.type==='transit-needed')return{icon:'🎯',label:'のりばがいる',title:'のりばが<br>まだないよ'};
  return null;
}

function showTownIssuePopup(issueId){
  const issue=(state.townIssues||[]).find(x=>x.id===issueId);
  if(!issue)return;
  const meta=townIssueMeta(issue)||{icon:'❓',title:'まだなにか<br>ありそう'};
  document.getElementById('pp-obstacle').innerHTML=eventSVG(meta.icon,'popup-svg-wrap');
  const canRepair=issue.type==='burned-house'&&issue.state==='burned'&&issue.requiredVehicle==='excav'&&hasVehicle('excav');
  document.getElementById('pp-title').innerHTML=canRepair?'しょべるかーで<br>かたづけよう！':meta.title;
  document.getElementById('pp-body').innerHTML=townIssueBody(issue,canRepair);
  document.getElementById('pp-progress').innerHTML=canRepair?`<button class="btn btn-orange" onclick="repairTownIssue('${issue.id}')">しょべるかーでなおす！</button>`:'';
  document.getElementById('preview-popup').classList.remove('hidden');
}

function townIssueBody(issue,canRepair){
  if(canRepair)return'しょべるかーをゲットしたね！<br>こわれたおうちをかたづけて<br>まちをなおそう。';
  if(issue.type==='burned-house')return'しょうぼうしゃが火をけしてくれたね！<br>でも、こわれたおうちは<br><strong style="color:#FFE66D">しょべるかー</strong>がきたらかたづけられるよ。';
  if(issue.type==='police-risk'&&issue.state==='risk')return'ぱとかーがどろぼうをおいはらったよ。<br>でも、けいさつしょがないから<br><strong style="color:#FFE66D">ぶるどーざー</strong>がきたら土地をつくろう。';
  if(issue.type==='police-risk'&&issue.state==='lot')return'けいさつしょの土地ができたよ。<br>つぎは<strong style="color:#FFE66D">くれーんしゃ</strong>で<br>けいさつしょをたてよう。';
  if(issue.type==='police-station')return'けいさつしょができたよ！<br>これでどろぼうがきても<br>まちをまもれるね。';
  if(issue.type==='hospital-needed')return'きゅうきゅうしゃが助けてくれたね。<br>でも、まちにはまだ<br><strong style="color:#FFE66D">びょういん</strong>がひつようだよ。';
  if(issue.type==='transit-needed')return'たくしーが送ってくれたね。<br>でも、みんなが迷わないように<br><strong style="color:#FFE66D">のりば</strong>がほしいね。';
  return'あとでべつのくるまがきたら<br>なにかできるかもしれないよ。';
}

function issueNeedText(issue){
  if(issue.type==='burned-house'&&issue.state==='burned')return hasVehicle('excav')?'なおせる！':'しょべるかー';
  if(issue.type==='police-risk'&&issue.state==='risk')return'ぶるどーざー';
  if(issue.type==='police-risk'&&issue.state==='lot')return'くれーんしゃ';
  if(issue.type==='police-station')return'かんせい';
  if(issue.type==='hospital-needed')return'びょういん';
  if(issue.type==='transit-needed')return'のりば';
  return'あとで';
}

function drawRoads(content,W){
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class','map-svg');svg.style.height=MAP_H+'px';
  svg.setAttribute('viewBox',`0 0 ${W} ${MAP_H}`);svg.setAttribute('preserveAspectRatio','xMidYMin meet');
  for(let i=0;i<STAGES.length-1;i++){
    const ax=W*xpct(i)+N/2,ay=NODE_Y[i]+N/2;
    const bx=W*xpct(i+1)+N/2,by=NODE_Y[i+1]+N/2;
    const sway=(i%4<2?1:-1)*Math.min(42,W*.09);
    const mx=(ax+bx)/2,d=`M${ax} ${ay} C${mx+sway} ${ay+22},${mx-sway} ${by-22},${bx} ${by}`;
    const done=fogClass(i)==='completed';
    ap(svg,d,'rgba(0,0,0,.28)',58,'');
    ap(svg,d,done?'#4A7A3D':'#8B7355',48,'');
    ap(svg,d,done?'rgba(165,214,167,.85)':'rgba(255,248,200,.55)',6,'16 12');
  }
  const ref=content.querySelector('.world-banner');content.insertBefore(svg,ref||content.firstChild);
}
function ap(svg,d,stroke,width,dash){
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',d);p.setAttribute('stroke',stroke);p.setAttribute('stroke-width',width);
  p.setAttribute('fill','none');p.setAttribute('stroke-linecap','round');
  if(dash)p.setAttribute('stroke-dasharray',dash);svg.appendChild(p);
}

// ── EVENT MARKERS ─────────────────────────────────────────────
function midPoint(W,fi,ti){
  const ax=W*xpct(fi)+N/2,ay=NODE_Y[fi]+N/2;
  const bx=W*xpct(ti)+N/2,by=NODE_Y[ti]+N/2;
  return{fx:(ax+bx)/2,fy:(ay+by)/2,ax,ay};
}

function addActiveMarker(content,W){
  const{fx,fy}=midPoint(W,state.pendingEvent,state.stage);
  const ev=STAGES[state.pendingEvent].ev;
  if(ev.e==='🔥'&&audioReady)startFireSound();
  const m=document.createElement('div');m.className='event-marker';m.id='event-marker';
  m.style.cssText=`left:${fx}px;top:${fy-30}px;`;
  m.innerHTML=`${eventSVG(ev.e)}<div class="event-hint">${iconSVG('👆')}タップ！</div>`;
  m.addEventListener('click',()=>playMapEvent(content,W));
  content.appendChild(m);
}

function addPreviewMarker(content,W,fi){
  const ti=fi+1;if(ti>=STAGES.length)return;
  const{fx,fy}=midPoint(W,fi,ti);
  const ev=STAGES[fi].ev;
  const m=document.createElement('div');m.className='preview-marker';
  m.style.cssText=`left:${fx}px;top:${fy-26}px;`;
  m.innerHTML=`${eventSVG(ev.e,'preview-svg-wrap')}${iconSVG('🔒','preview-lock')}<div class="preview-hint">${STAGES[fi].name}でかいけつ</div>`;
  m.addEventListener('click',()=>showPreviewPopup(fi));
  content.appendChild(m);
}

function showPreviewPopup(stageIdx){
  const s=STAGES[stageIdx];
  const earned=state.stage===stageIdx?state.earnedParts.filter(v=>v).length:0;
  document.getElementById('pp-obstacle').innerHTML=eventSVG(s.ev.e,'popup-svg-wrap');
  document.getElementById('pp-title').innerHTML=`${s.name}をかんせいさせると<br>ここをとおれるよ！`;
  document.getElementById('pp-body').innerHTML=`まいあさ4つのしたくをやると<br><strong style="color:#FFE66D">${s.name}</strong>がかんせい！<br>ぜんぶやると⭐スペシャルパーツももらえる！`;
  const prog=document.getElementById('pp-progress');prog.innerHTML='';
  for(let i=0;i<5;i++){
    const d=document.createElement('div');
    const isBonus=i===4;
    d.className=`popup-dot${i<earned?(isBonus?' bonus':' on'):''}`;
    if(i<earned)d.style.background=isBonus?'#FFD700':s.color;
    prog.appendChild(d);
  }
  document.getElementById('preview-popup').classList.remove('hidden');
}

// ── EVENT ROUTER ──────────────────────────────────────────────
function playMapEvent(content,W){
  ensureAudio();stopFireSound();
  const fi=state.pendingEvent,ti=state.stage;
  const{fx,fy,ax,ay}=midPoint(W,fi,ti);
  const marker=document.getElementById('event-marker');if(marker)marker.style.pointerEvents='none';
  if(marker)marker.remove();
  const id=STAGES[fi].id;
  const onDone=()=>{setTimeout(()=>{
    if(id==='fire')addBurnedHouseIssue(fi);
    else{
      if(!state.buildings)state.buildings=[];
      state.buildings[fi]=true;
      if(id==='police')addPoliceRiskIssue(fi);
      if(id==='ambu')addHospitalNeededIssue(fi);
      if(id==='taxi')addTransitNeededIssue(fi);
      if(id==='excav')resolveBurnedHouseIssues();
      if(id==='bull'||id==='crane')advancePoliceStory(id);
    }
    state.pendingEvent=-1;save();buildMap();
  },900);};
  if(id==='fire')   evFire(content,W,fi,ti,ax,ay,fx,fy,onDone);
  else if(id==='police') evPolice(content,W,fi,ti,ax,ay,fx,fy,onDone);
  else if(id==='ambu')   evAmbu(content,W,fi,ti,ax,ay,fx,fy,onDone);
  else if(id==='taxi')   evTaxi(content,W,fi,ti,ax,ay,fx,fy,onDone);
  else if(['excav','bull','crane'].includes(id)) evWorkVehicle(content,W,fi,ti,ax,ay,fx,fy,onDone);
  else                   evGeneric(content,W,fi,ti,ax,ay,fx,fy,onDone);
}

// ── EVENT ANIMATION HELPER ────────────────────────────────────
function ea(c,cx,cy,sz,txt,css=''){
  const el=document.createElement('div');
  el.style.cssText=`position:absolute;left:${cx-sz/2}px;top:${cy-sz/2}px;width:${sz}px;height:${sz}px;font-size:${sz}px;line-height:1;z-index:20;pointer-events:none;${css}`;
  if(txt){
    const svg=EVT_SVGS[txt]||BUILDING_SVGS[txt];
    if(svg)el.innerHTML=`<div class="event-anim-svg">${svg}</div>`;
    else el.textContent=txt;
  }
  c.appendChild(el);return el;
}
function makeTapTarget(el,label,fn){
  el.style.pointerEvents='auto';el.style.cursor='pointer';
  el.setAttribute('role','button');el.setAttribute('aria-label',label);
  el.addEventListener('click',fn);
}
function eaCar(c,cx,cy,sz,id,css=''){
  const el=ea(c,cx,cy,sz,'',css);
  el.innerHTML=`<div class="event-anim-svg">${getCarSVG(id,ALL_TRUE)}</div>`;
  return el;
}
function moveEl(el,cx,cy,sz){el.style.left=(cx-sz/2)+'px';el.style.top=(cy-sz/2)+'px';}
function fadeOut(el,ms=400){el.style.transition=`opacity ${ms}ms`;el.style.opacity='0';}
function movePlayer(W,toIdx){
  const pl=document.getElementById('player');if(!pl)return;
  pl.style.transition='left .7s cubic-bezier(.34,1.56,.64,1),top .7s cubic-bezier(.34,1.56,.64,1)';
  pl.style.left=(W*xpct(toIdx)+N/2-22)+'px';pl.style.top=(NODE_Y[toIdx]-28)+'px';
}

function evFire(c,W,fi,ti,ax,ay,fx,fy,done){
  const h1=ea(c,fx-30,fy-5,44,'🏚️'),h2=ea(c,fx+22,fy+12,38,'🏚️');
  const helper=ea(c,fx-68,fy+36,46,'','');
  helper.innerHTML=personSVG('firefighter');
  const resident=ea(c,fx+72,fy+32,44,'','');
  resident.innerHTML=personSVG('residentSad');
  const hydrant=ea(c,fx-62,fy-20,34,'','');
  hydrant.innerHTML=personSVG('hydrant');
  const fireSpots=[
    [-34,-54,32],[-5,-62,28],[28,-44,30],[-16,-24,25],[36,-10,24]
  ];
  let remaining=fireSpots.length,finished=false;
  const fires=fireSpots.map(([ox,oy,sz],i)=>{
    const f=ea(c,fx+ox,fy+oy,sz,'🔥',`animation:firePulse .38s ease-in-out infinite ${i*.06}s`);
    f.style.pointerEvents='auto';f.style.cursor='pointer';
    f.setAttribute('aria-label','火をけす');
    f.addEventListener('click',()=>{
      if(finished||f.dataset.out)return;
      f.dataset.out='1';soundWater();
      for(let j=0;j<3;j++){
        const w=ea(c,fx+ox+(Math.random()*18-9),fy+oy+(Math.random()*16-8),22,'💧',`animation:waterDrop .55s ease ${j*.06}s forwards`);
        setTimeout(()=>w.remove(),700+j*60);
      }
      fadeOut(f,260);setTimeout(()=>{try{f.remove();}catch{}},320);
      remaining--;
      if(remaining<=0)finishFire();
    });
    return f;
  });
  const car=eaCar(c,ax,ay,58,'fire','transition:left .9s ease,top .9s ease');
  soundSiren();
  setTimeout(()=>moveEl(car,fx-34,fy,58),80);
  setTimeout(()=>speak('火をタップして、ぜんぶけそう。'),900);

  function finishFire(){
    if(finished)return;finished=true;stopFireSound();
    speak('しょうかせいこう。でも、もえたおうちはまだのこっているよ。');
    for(let i=0;i<8;i++)setTimeout(randSpark,i*70);
    setTimeout(()=>fadeOut(car,300),550);
    setTimeout(()=>movePlayer(W,ti),850);
    setTimeout(()=>{
      [h1,h2,helper,resident,hydrant,car,...fires].forEach(e=>{try{e.remove();}catch{}});
      done();
    },1500);
  }
}

let _rt=null;
function startReset(){
  const bar=document.getElementById('reset-bar');bar.classList.add('go');
  _rt=setTimeout(()=>{
    bar.classList.remove('go');
    if(!confirm('さいしょからやりなおしますか？'))return;
    stopReminderLoop();stopFireSound();
    localStorage.removeItem('kuruma-v5');state=defState();save();showMap();
  },3000);
}
function cancelReset(){
  clearTimeout(_rt);_rt=null;
  const bar=document.getElementById('reset-bar');bar.style.transition='none';bar.classList.remove('go');

// ── CHECKLIST ─────────────────────────────────────────────────
function openChecklist(){
  ensureAudio();
  startReminderLoop();
  const s=STAGES[state.stage];
  document.getElementById('cl-preview').innerHTML=s?`${carInlineHTML(s)}をつくろう！`:'';
  const list=document.getElementById('task-list');list.innerHTML='';
  TASKS.forEach(t=>{
    const done=state.tasks[t.id];
    const partName=s?s.parts[t.partIdx]:PART_LABELS[t.partIdx];
    const item=document.createElement('div');item.className=`task-item${done?' done':''}`;item.id=`ti-${t.id}`;
    item.addEventListener('click',()=>toggleTask(t.id));
    item.innerHTML=`
      <div class="t-emoji">${t.emoji}</div>
      <div style="flex:1">
        <div class="t-name">${t.name}</div>
        <div class="t-part">→ ${partName}</div>
      </div>
      <div class="t-check">${done?'✓':''}</div>`;
    list.appendChild(item);
  });
  syncBtn();showScreen('screen-checklist');
}

function toggleTask(id){
  ensureAudio();
  state.tasks[id]=!state.tasks[id];save();
  const item=document.getElementById(`ti-${id}`),done=state.tasks[id];
  item.classList.toggle('done',done);item.querySelector('.t-check').textContent=done?'✓':'';
  if(done){
    soundTask();
    burstAt(item);
    const task=TASKS.find(t=>t.id===id);
    if(task)speak(`${task.name}、できたね。`);
  }
  syncBtn();
}

function syncBtn(){
  const allDone=TASKS.every(t=>state.tasks[t.id]);
  document.getElementById('btn-done').disabled=!TASKS.some(t=>state.tasks[t.id]);
  const banner=document.getElementById('bonus-banner');
  banner.classList.toggle('hidden',allDone);
  // Show bonus banner only when not all done yet (as a reminder)
  if(allDone){banner.textContent='⭐ ぜんぶクリア！Special パーツゲット！';banner.classList.remove('hidden');}
  else if(TASKS.some(t=>state.tasks[t.id])){banner.textContent='⭐ ぜんぶできたら Special パーツももらえる！';banner.classList.remove('hidden');}
  else banner.classList.add('hidden');
}

// ── PARENT ────────────────────────────────────────────────────
function openParent(){
  const s=STAGES[state.stage];
  const allDone=TASKS.every(t=>state.tasks[t.id]);
  const list=document.getElementById('par-list');list.innerHTML='';
  TASKS.forEach(t=>{
    const done=state.tasks[t.id];
    const partName=s?s.parts[t.partIdx]:PART_LABELS[t.partIdx];
    const row=document.createElement('div');row.className='par-row';
    row.innerHTML=`
      <span style="font-size:30px">${t.emoji}</span>
      <div class="par-lbl">${t.name}<div class="par-part">→ ${done?partName:'（まだ）'}</div></div>
      <span style="font-size:26px">${done?'✅':'⬜'}</span>`;
    list.appendChild(row);
  });
  const bonus=document.getElementById('par-bonus');
  if(allDone){bonus.classList.remove('hidden');bonus.textContent='⭐ ぜんぶできた！Special パーツボーナス！';}
  else bonus.classList.add('hidden');
  showScreen('screen-parent');
}

// ── APPROVE & PARTS ───────────────────────────────────────────
let _q=[],_willComplete=false;

function approve(){
  ensureAudio();
  stopReminderLoop();
  state.approvedToday=true;
  if(state.stage>=STAGES.length){showMap();return;}

  const s=STAGES[state.stage];
  const prevEarned=[...state.earnedParts];
  const newPis=[];

  TASKS.forEach(t=>{
    if(state.tasks[t.id]&&!prevEarned[t.partIdx]){
      newPis.push(t.partIdx);
    }
  });

  if(!newPis.length){showMap();return;}

  // Compute new earned state
  const newEarned=[...prevEarned];
  newPis.forEach(pi=>newEarned[pi]=true);

  // Special bonus: all 4 base parts earned → award part 4
  if(newEarned.slice(0,4).every(v=>v)&&!newEarned[4]){
    newEarned[4]=true;newPis.push(4);
  }

  newPis.sort((a,b)=>a-b);
  const willComplete=newEarned.every(v=>v);

  // Update state
  state.earnedParts=willComplete?[...ALL_FALSE]:newEarned;
  if(willComplete){state.pendingEvent=state.stage;state.stage=Math.min(state.stage+1,STAGES.length);}
  save();

  // Build animation queue with running dots state
  let dotsAcc=[...prevEarned];
  _q=newPis.map(pi=>{
    dotsAcc=[...dotsAcc];dotsAcc[pi]=true;
    return{id:s.id,name:s.parts[pi],idx:pi,dots:[...dotsAcc],color:s.color,isSpecial:pi===4};
  });
  _willComplete=willComplete;
  nextPart();
}

function nextPart(){
  if(!_q.length){
    if(_willComplete){_willComplete=false;showComplete(STAGES[state.stage-1]);}
    else showMap();return;
  }
  const p=_q.shift();
  soundAttach();
  document.getElementById('pg-svg').innerHTML=getCarSVG(p.id,p.dots,p.idx);

  const label=document.getElementById('pg-label');
  const nameEl=document.getElementById('pg-name');
  if(p.isSpecial){
    label.textContent='⭐ スペシャル パーツゲット！';
    nameEl.className='pg-special fadeup';
    nameEl.textContent=p.name;
  }else{
    label.textContent='パーツゲット！';
    nameEl.className='pg-name fadeup';
    nameEl.textContent=p.name;
  }

  const dots=document.getElementById('pg-dots');dots.innerHTML='';
  for(let i=0;i<5;i++){
    const d=document.createElement('div');
    const isBonus=i===4;
    d.className=`pg-dot${p.dots[i]?(isBonus?' bonus':' on'):''}`;
    if(p.dots[i])d.style.background=isBonus?'#FFD700':p.color;
    dots.appendChild(d);
  }

  document.querySelectorAll('#screen-part-gain .fadeup').forEach(el=>{el.style.animation='none';void el.offsetWidth;el.style.animation='';});
  showScreen('screen-part-gain');

  const delay=p.isSpecial?2200:1500;
  setTimeout(nextPart,delay);
}

// ── CAR COMPLETE ──────────────────────────────────────────────
function showComplete(s){
  soundComplete();
  speak(`${s.name}、かんせい。やったね。`);
  document.getElementById('cc-svg').innerHTML=getCarSVG(s.id,ALL_TRUE);
  document.getElementById('cc-title').textContent=`${s.name} かんせい！`;
  showScreen('screen-car-complete');
  for(let i=0;i<22;i++)setTimeout(randSpark,i*65);
}

// ── SPARKLES ──────────────────────────────────────────────────
function burstAt(el){
  const r=el.getBoundingClientRect();
  for(let i=0;i<4;i++){const s=document.createElement('div');s.className='spark';s.textContent=SPARKS[Math.random()*SPARKS.length|0];s.style.cssText=`font-size:${18+Math.random()*10}px;left:${r.left+r.width*Math.random()}px;top:${r.top+r.height*.3}px;`;document.body.appendChild(s);setTimeout(()=>s.remove(),700);}
}
function randSpark(){
  const s=document.createElement('div');s.className='spark';s.textContent=SPARKS[Math.random()*SPARKS.length|0];
  s.style.cssText=`font-size:${20+Math.random()*13}px;left:${5+Math.random()*90}vw;top:${5+Math.random()*85}vh;`;
  document.body.appendChild(s);setTimeout(()=>s.remove(),700);
}

// ── TEST HELPERS ──────────────────────────────────────────────
function testNextDay(){
  state.approvedToday=false;
  state.tasks=Object.fromEntries(TASKS.map(t=>[t.id,false]));
  save();startReminderLoop();openGarage();
}
function testSkipCar(){
  if(state.stage>=STAGES.length){alert('もう全部クリア！');return;}
  state.pendingEvent=state.stage;state.earnedParts=[...ALL_FALSE];
  state.stage=Math.min(state.stage+1,STAGES.length);
  save();showMap();
}

// ── BOOT ──────────────────────────────────────────────────────
showMap();showScreen('screen-map');
</script>
